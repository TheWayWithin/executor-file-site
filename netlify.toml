[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# executor-file.com 301s to executorfile.com once both domains are on
# Netlify DNS (see NOTES.md). Force = true so the redirect wins even though
# both domains serve the same site.
[[redirects]]
  from = "https://executor-file.com/*"
  to = "https://executorfile.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.executor-file.com/*"
  to = "https://executorfile.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.executorfile.com/*"
  to = "https://executorfile.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
